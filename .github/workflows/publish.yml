name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    if: github.repository == 'egy186/icojs'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Install
      run: npm ci

    - name: Build
      run: npm run build

    - name: Publish
      run: npm publish
  build-pages:
    runs-on: ubuntu-latest
    needs: publish
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Install
      run: npm ci

    - name: Build
      run: npm run docs -- --gitRevision ${GITHUB_REF_NAME}

    - name: Upload
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
      with:
        path: docs
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
