name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    if: github.repository == 'egy186/icojs'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
      with:
        node-version: lts/*

    - name: Install
      run: npm ci

    - name: Build
      run: npm run build

    - name: Publish
      run: npm publish
  build-pages:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
      with:
        node-version: lts/*

    - name: Install
      run: npm ci

    - name: Build
      run: npm run docs -- --gitRevision ${GITHUB_REF_NAME}

    - name: Upload
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
      with:
        path: docs
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
